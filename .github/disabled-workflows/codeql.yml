name: CodeQL Security Analysis

# DISABLED: Workflow temporarily disabled
# To re-enable, uncomment the 'on:' section below
# on:
#   push:
#     branches: [ main, develop ]
#   pull_request:
#     branches: [ main, develop ]
#   schedule:
#     - cron: '0 6 * * 1'  # Run every Monday at 6 AM UTC
#   workflow_dispatch:
on: []

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: +security-and-quality
        # Enable additional query suites for more comprehensive analysis
        
    - name: Build project
      run: |
        ./mvnw clean package -DskipTests -B

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
        upload: true
        
    - name: Upload CodeQL results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codeql-results
        path: /home/runner/work/_temp/codeql_databases/
        retention-days: 7
