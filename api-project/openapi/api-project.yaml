openapi: 3.0.3
info:
  title: ODS API Server
  description: API documentation for ODS (Open DevStack) API Service
  contact:
    name: ODS Team
  version: v0.0.1
servers:
  - url: http://{baseurl}/api/v0
    variables:
      baseurl:
        default: localhost:8080
        description: Development environment
tags:
- name: Project
  description: API for manage EDP projects.
paths:
  /projects:
    post:
      tags:
      - Projects
      summary: Create a new project.
      description: Creates a new project with the provided configuration. Generates a unique project key if not provided.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Project creation initiated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          description: Invalid request body or validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        "401":
          description: Invalid client token on the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorMessage'
        "403":
          description: Insufficient permissions for the client to access the resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorMessage'
        '409':
          description: A project with the specified key already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '500':
          description: Internal server error during project creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
  /projects/{projectKey}:
    get:
      tags:
      - Projects
      summary: Get project status by project key.
      description: Returns the current status and details of the project identified by the given project key.
      operationId: getProject
      parameters:
      - name: projectKey
        in: path
        required: true
        schema:
          type: string
        description: Project key to retrieve information.
      responses:
        '200':
          description: Project information retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        "401":
          description: Invalid client token on the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorMessage'
        "403":
          description: Insufficient permissions for the client to access the resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorMessage'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
components:
  schemas:
    RestErrorMessage:
      properties:
        message:
          type: string
      required:
        - message
    CreateProjectRequest:
      type: object
      properties:
        projectKey:
          type: string
          description: Optional project key. If not provided, a unique key will be generated.
        projectKeyPattern:
          type: string
          description: Optional pattern for generating the project key (e.g. 'SS%06d').
        projectName:
          type: string
          description: Name of the project.
        projectDescription:
          type: string
          description: Description of the project.
      required:
        - projectName
    CreateProjectResponse:
      type: object
      properties:
        projectKey:
          type: string
        status:
          type: string
        message:
          type: string
        error:
          type: string
        errorKey:
          type: string
        errorDescription:
          type: string
